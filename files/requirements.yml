---
functional:
  - Пользователь должен иметь возможность искать товары по ключевому слову или категории
  - Пользователь должен иметь возможность фильтровать товары
  - Пользователь должен иметь возможность просматривать товары и просматривать подробную информацию о товаре
  - Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  - Пользователь должен иметь возможность переключить язык интерфейса
non-functional:
  - Сайт должен быть безопасным и защищать данные пользователя
  - Сайт должен иметь мобильную версию
  - Сайт нужно протестировать на совместимость с последними версиями браузеров
  - Важно, чтобы сайт мог обрабатывать большое количество трафика
  - Сайт должен быть доступен на различных устройствах
  - Сайт должен иметь локализацию (перевод) на русский и английский языки
implicit:
    - Поиск должен игнорировать регистр символов
    - Поиск должен работать с частичными совпадениями
    - Результаты должны сортироваться по релевантности
    - Фильтры должны применяться без перезагрузки страницы
    - Должна быть возможность сбросить все фильтры одним действием
    - Фильтры должны корректно работать с кириллицей и латиницей
    - При отсутствии результатов — информативное сообщение
    - Цена должна отображаться в актуальной валюте
    - Товар должен добавляться в корзину без перезагрузки страницы
    - Должна быть индикация добавления товара в корзину
    - Должна быть возможность удалить товар из корзины
    - Выбранный язык должен сохраняться между сессиями
    - Все элементы интерфейса должны быть переведены
    - Даты, числа, валюты должны форматироваться согласно локали
    - Язык должен определяться автоматически по браузеру/региону
    - Текст на кнопках и в меню не должен обрезаться
    - Все страницы должны работать по HTTPS
    - Должна быть защита от XSS, SQL-инъекций
    - Адаптивный дизайн для разных размеров экранов
    - Формы должны быть удобны для заполнения на мобильном
    - Сайт должен корректно отображаться в Chrome, Firefox, Safari, Edge в двух последних версиях
    - Время отклика не должно значительно увеличиваться при нагрузке
    - Работоспособность на медленных соединениях
    - Корректное отображение в портретной и альбомной ориентации

